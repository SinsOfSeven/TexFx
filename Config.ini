namespace = TexFx


; ------- INFO -------
; If using Keybindings.ini, it's recommended to change these to `global persist`
;
; -------      -------

[Constants]
; Set to 0/1/2 to make the default Uncensor ON/OFF/MODIFIED
global $uncensor = 2

;Set to 0/1 to Disable/Enable "Animated RGB" Effects (May cause unexpected bright flashing lights).
global $seizure = 1

; Set To 0/1 to make outlines for transparent parts default OFF
global $outline_mode = 0

; Set To 0/1 to control back rendering transparent parts default ON
global $back_render = 1

; v_____________ USER CONFIG _____________v
; Feel Free to copy this to any ini file in your mod folder.
; .\Mods\TexFxSettings.ini
[Constants]
; post $uncensor = 0
; post $seizure = 0
; post $outline_mode = 0
; post $back_render = 1

; ^------------- USER CONFIG -------------^