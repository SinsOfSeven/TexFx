namespace = TexFx

; Variables & Resources ------------------------------
[Constants]
global $version = 1.064069
global $texfx_on = 1
global $outline_mode_supercide
global $hull_hack
global $hull_hack_key = 1
global $hull_hack_val = -1
global $use_default_shader
global $glow_intensity = 1
global $bloom_intensity = 1
global $glow = 1
global $bloom = 1
global $hue = 0
global $sat = 0
global $val = 0
global $alpha = 0
; Experimental Transparency
global $drawn = 0
global $internal_control
global $back_render = 1
; DrawIndexed Params
global $_1 = 0
global $_2 = 0
global $_3 = 0

; Present --------------------------------------------
[Present]
run = CommandListTexFxApplyTransparency
post $drawn = 0
post run = CommandListClearFakes

; Needs a refactor
run = CommandListClearInstanceValues
y69 = 0
x69 = 0
if $texfx_on == 0
    y69 = -1
endif
z69 = $uncensor
x69 = 0
$use_default_shader = -1
$hull_hack_val = 0
run = CommandListClearInstanceValues
post run = CommandListSetFlags

post x100 = 0
post y100 = 0
post z100 = 0
post w100 = 0
post x101 = 0
post w103 = 0

[CommandListSetFlags]
; x69 = S__message, a2, b2, c2, d4
; 2 4 8 16 32
; 0 0 0  0  0
; a b c  d  d
local $__message = 0
local $__a = $texfx_on % 2
local $__b = $seizure % 2
local $__c = (($outline_mode + $outline_mode_supercide) > 0) % 2
local $__d = $uncensor % 3
$__message = $__a*2 + $__b*4 + $__c*8 + $__d*16
x69 = $__message
; y69 = $glow
; z69 = $bloom
; w69 = $alpha
; x70 = shader pass, 0, 1, 2
; y70 = $hue
; z70 = $sat
; w70 = $val
x100 = $__a
y100 = $__b
z100 = $__c
w100 = $__d
x101 = $back_render

; Commandlists ---------------------------------------
[CommandListTransparecny_new]
run = CommandList_DiffuseSecondDraw

[CommandListT]
$use_default_shader = 0
run = CommandListTransparecny_new
$use_default_shader = -1
[CommandListTransparency]
$use_default_shader = 0
run = CommandListTransparecny_new
$use_default_shader = -1

[CommandListC]
run = CommandListComponent
[CommandListComponent]
run = CommandList_DiffuseSecondDraw
run = CommandListDrawFromVars
run = CommandListClearDrawArgs

[CommandListFO.E]
$outline_mode_supercide = 1
[CommandListFO.Enable]
$outline_mode_supercide = 1
[CommandListForceOutline.Enable]
$outline_mode_supercide = 1

[CommandListFO.D]
$outline_mode_supercide = -1
[CommandListFO.Disable]
$outline_mode_supercide = -1
[CommandListForceOutline.Disable]
$outline_mode_supercide = -1

[CommandListSetIV]
run = CommandListSetInstanceValues
[CommandListSetInstanceValues]
y69 = $glow*($glow_intensity==1)+$glow_intensity*($glow_intensity!=1)
z69 = $bloom*($bloom_intensity==1)+$bloom_intensity*($bloom_intensity!=1)
w69 = $alpha
x70 = 0
y70 = $hue
z70 = $sat
w70 = $val

[CommandListClearIV]
run = CommandListClearInstanceValues
[CommandListClearInstanceValues]
$bloom_intensity = 1
$glow_intensity = 1
$alpha = 0
$bloom = 1
$glow = 1
$hue = 0
$sat = 0
$val = 0

if $debug_rgb
    $cos_in = time/1
    run = CommandListRun_Cos
    $bloom_intensity = $cos_out*0.15+0.4
    $cos_in = time/2
    run = CommandListRun_Cos
    $glow_intensity = -$cos_out*0.15+0.4

    $cos_in = time
    run = CommandListRun_Cos
    $\texfx\hue = $cos_out*0.5+0.5

    $cos_in = time*2
    run = CommandListRun_Cos
    ;$\texfx\val = 0

    $cos_in = time/2
    run = CommandListRun_Cos
    $\texfx\sat = -$cos_out*50
endif

; Reset Outline Mode
run = CommandListSetInstanceValues

[Constants]
global $cos_in
global $cos_out

[CommandListRun_Cos]
local $pi = 3.14159265
if $cos_in == inf || $cos_in == -inf || $cos_in == NaN || $cos_in == null
    $cos_out = NaN
else
    local $x = ($cos_in+$pi/2)%$pi-$pi/2
    local $xx = $x*$x
    local $f0 = -($xx/2)
    local $f1 = (($xx*$xx)/24)
    local $f2 = -(($xx*$xx*$xx)/720)
    local $f3 = (($xx*$xx*$xx*$xx)/40320)
    local $f4 = -(($xx*$xx*$xx*$xx*$xx)/3628800)
    $cos_out = -((($cos_in+$pi/2)/$pi)%2//1*2-1) * (1+$f0+$f1+$f2+$f3+$f4)
endif
$cos_in = 0
