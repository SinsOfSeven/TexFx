namespace = TexFx

[ShaderRegexDiffuseTransparency]
shader_model = ps_4_0 ps_5_0
;filter_index = 4243.05
temps = ini tex69 dim storage color o1 o2 texcoord
if ps-t69 === 0
    ;dump = o0 dds
    ; $counter = $counter + 1
    run = CommandListClearInstanceValues
endif


;Cute regex to match (almost) every character diffuse shader and outline
[ShaderRegexDiffuseTransparency.Pattern]
(?(DEFINE)
(?'fl'-?\d+\.?\d{0,6})
(?'cmp'\.[xyzw]{1,4})
(?'l1'l\((?&fl)\))
(?'l4'l\((?&fl),\s(?&fl),\s(?&fl),\s(?&fl)\))
(?'r'-?r\d\d?\.[xyzw]{1,4})
(?'v'-?v\d\d?\.[xyzw]{1,4})
(?'rv'-?[rv]\d\d?\.[xyzw]{1,4})
(?'cb'-?cb\d\[\d+\]\.\w{1,4})
(?'icb'icb\[-?r\d\d?\.[xyzw]{1,4}\h\+\h-?\d+\]\.[xyzw]{1,4})
(?'dcl2d'dcl_resource_texture2d\s\(float,float,float,float\)\st\d\d?\n)
(?'dclin'dcl_input_ps[\w\h]+(?&v)\n)
(?'s2d'sample_[b_]{0,2}(aoffimmi_)?indexable(\(\d,\d,\d\))?\(texture2d\)\(float,float,float,float\))
((?'oop'\w+\h(?'oo1'o1(?&cmp))|(?'oo2'o2(?&cmp))|(?'oo4'o4(?&cmp)|o\d(?&cmp)),\h.+))
(?'br'(?:.*\n)*?)
)(?s)
(?'MatchDiffuse'
(?&dcl2d){3,}
(?&dclin){3,}
(?'backface'dcl_input_ps_sgv\sconstant\sv\d{1,2}\.x,\sis_front_face\n)?
dcl_output\so0\.xyzw\n
dcl_output\so1\.xyzw\n
dcl_output\so2\.xyzw\n
dcl_output\so3\.x\n
dcl_output\so4\.x\n
dcl_output\so5\.x\n
dcl_temps\s\d\d?.*)
(?'ModestyB'
\h*if_nz\s(?&r)\n
\h+div\s(?&r),\s(?&v),\s(?&v)\n
\h+mul\s(?&r),\s(?&r),\s(?&cb)\n
\h+mul\s(?&r),\s(?&r),\s(?&l4)\n
\h+ge\s(?&r),\s(?&r),\s(?&r)\n
\h+frc\s(?&r),\s\|(?&r)\|\n
\h+movc\s(?&r),\s(?&r),\s(?&r),\s(?&r)\n
\h+mul\s(?&r),\s(?&r),\s(?&l4)\n
\h+ftou\s(?&r),\s(?&r)\n
\h+dp\d\s(?&r),\s(?&cb),\s(?&icb)\n
\h+dp\d\s(?&r),\s(?&cb),\s(?&icb)\n
\h+dp\d\s(?&r),\s(?&cb),\s(?&icb)\n
\h+dp\d\s(?&r),\s(?&cb),\s(?&icb)\n
\h+dp\d\s(?&r),\s(?&r),\s(?&icb)\n
\h+mad\s(?&r),\s((?&cb)|(?&r)),\s(?&l1),\s(?&r)\n
\h+add\s(?&r),\s(?&r),\s(?&l1)\n
\h+lt\s(?&r),\s(?&r),\s(?&l1)\n)
(?'TillTexcord'.*)
(?'sample'(?&s2d)\s-?r\d\d?\.[xyzw]{2,4},\s(?'TexcoordX'-?[rv]\d\d?\.[xyz][yzw][xyz][xyz]),\st[016]\.[xyzw]{3,4},\ss\d(,\s\w\d+(\.[xyzw]+)?)?)
;\s(?'Glow'(?'GlowHead'.*)sqrt\so1\.w,\s(?'GlowReg'(?&r)))?
;\s(?'o2Pick'(?'o2head'.*)movc\so2\.z,\s(?'o2PickReg'(?&r),\s(?&r),\s(?&r)))?
;\s(?'Tillo1'.*)(?'o1line'mov\so1\.(?'o1var'[xyzw]{3,4},\s(?&r)))
; (?'Tillo2'.*)(?'o2line'mov\so2\.(?'o2var'[xyzw]{2,4},\s(?&r)))
(?'Tillo2'.*mov\so2\.[xyzw]{2,4},\s(?&r))
; (?'Tillo4'.*)(?'Bloom'mov\so4.x,\s)(?'BloomReg'(?&r))
(?'Tillo4'.*mov\so4.x,\s(?&r))
(?'TillRet'.*)
ret

[ShaderRegexDiffuseTransparency.InsertDeclarations]
dcl_resource_texture1d (float,float,float,float) t120
dcl_resource_texture2d (float,float,float,float) t69
dcl_sampler s15, mode_default
dcl_output o6.xyzw

;Inserts a discard statement if any pixel from our ps-t69 texture is not OPAQUE
[ShaderRegexDiffuseTransparency.Pattern.Replace]
${MatchDiffuse}
;discard_z l(0)\n
${ModestyB}
${TillTexcord}\n
mov ${texcoord}.xyzw, ${TexcoordX}\n
${sample}
; ${Glow:+${Glow}\n:}
; ${o2Pick:+mov ${o2}.z, ${storage}.z\n
; ${o2Pick}:}
; ;${Tillo2CBPick}\n
; ${Tillo1}${o1line}\n
${Tillo2}
;${o2line}\n
${Tillo4}
; ; mov ${storage}.w, ${BloomReg}\n
; ${Bloom}${BloomReg}\n
${TillRet}
;mul o1.y, o1.y, l(0.2)\n
; EXPERIMENTAL
ld_indexable(texture1d)(float,float,float,float) ${ini}.xyzw, l(69,0), t120.xyzw\n
resinfo_indexable(texture2d)(float,float,float,float) ${dim}.xyyy, l(0), t69.xyzw\n
;mov ${tex69}.xyzw, l(0.000000, 0.000000, 0.000000, 1.000000)\n
;max ${dim}.xy, ${ini}.yy, ${dim}.xy\n
if_nz ${dim}.xy\n
\t  sample_aoffimmi_indexable(1,1,1)(texture2d)(float,float,float,float) ${tex69}.xyzw, ${texcoord}.xyzw, t69.xyzw, s15\n
\t  add ${ini}.x, ${ini}.x, -l(5.0)\n
\t  if_z ${ini}.x\n
\t\t    discard_z ${tex69}.x\n
;\t\t    mov o1.xyz, ${tex69}.xyzx\n
\t\t    mov o6.xyzw, ${tex69}.xxxx\n
\t  else\n
\t\t    discard_nz ${tex69}.x\n
\t  endif\n
endif\n
ret\n

