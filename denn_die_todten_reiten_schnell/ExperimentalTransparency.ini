namespace = TexFx

[Present]
if $texfx_on
    post $control = 0
    post w103 = 0
    run = CustomShader_MERGE
    if 1
        run = CustomShaderShowShaderOutput
    endif
    run = CommandListDumpFakes
    run = CommandListClearFakes
    post $has_been = 0
endif

[TextureOverride_o0]
match_type = Texture2D
match_format = R10G10B10A2_TYPELESS
match_height = height
match_width = width
match_bind_flags = shader_resource render_target

if $detect_o0_in_t4 == 200
    ;ps-t = ResourceTempo1
    ;analyse_options = dump_rt dump_tex dds

elif $detect_o0_in_t4 == 500
    $detect_o0_in_t4 = 200
endif

; this = null

[TextureOverride_o1/o2]
match_type = Texture2D
match_format = R8G8B8A8_TYPELESS
match_height = height
match_width = width
match_bind_flags = shader_resource render_target
filter_index = 334.22
if $control == 3
