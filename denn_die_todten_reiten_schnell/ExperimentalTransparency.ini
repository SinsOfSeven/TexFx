[TextureOverrideAllIBTemp]
match_bind_flags = index_buffer
match_priority = -9999
ps-t69 = null
ps-t70 = null
; Trying a bit too hard to make everything trasnparent.
; $alpha = 0.5
; run = CommandListBatch.Pre
; if $internal_control
;     handling = skip
;     run = CommandListSetIV
;     ps-t69 = Resource\VirTex\LightMap
;     if $back_render
;         run = CustomShaderBack
;     endif
;     run = CustomShaderFront
;     x70 = 0
