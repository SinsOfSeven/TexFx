namespace = TexFx

[CommandListTexFxApplyTransparency]
if $texfx_on && !$drawn
    if ResourceFakeo0.f !== null
        $drawn = 1
        ;run = CommandListBackupOutputs

        run = BuiltInCommandListUnbindAllRenderTargets
        o0 = set_viewport bb
        ps-t2 = ResourceLatestoD
        x70 = 1
        ps-t0 = ResourceFakeo1.B
        ps-t1 = ResourceFakeo6.B
        ps-t3 = ResourceFakeoD.B
        run = CustomShaderShowShaderOutput
        x70 = 2
        ps-t0 = ResourceFakeo1.F
        ps-t1 = ResourceFakeo6.F
        ps-t3 = ResourceFakeoD.F
        run = CustomShaderShowShaderOutput

        ;run = CommandListRestoreOutputs
    endif
endif

