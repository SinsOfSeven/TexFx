namespace = TexFx

[ShaderRegexcensor]
shader_model = ps_4_0 ps_5_0
run = CommandListGetDescriptions
temps = param tex70 cond

[ShaderRegexcensor.InsertDeclarations]
dcl_resource_texture1d (float,float,float,float) t120

[ShaderRegexcensor.Pattern]
(?(DEFINE)
(?'fl'-?\d+\.?\d{0,6})
(?'l1'l\((?&fl)\))
(?'l4'l\((?&fl), (?&fl), (?&fl), (?&fl)\))
(?'r'-?r\d\d?\.[xyzw]{1,4})
(?'v'-?v\d\d?\.[xyzw]{1,4})
(?'cb'-?cb\d\[\d+\]\.\w{1,4})
(?'icb'icb\[-?r\d\d?\.[xyzw]{1,4}\h\+\h-?\d+\]\.[xyzw]{1,4})
)(?P<ModestyA>^\h*lt (?&r), ((?&cb)|(?&r)), )(?&l1)\n
(?'ModestyB'
^\h*if_nz (?&r)\n
^\h+div (?&r), (?&v), (?&v)\n
^\h+mul (?&r), (?&r), (?&cb)\n
^\h+mul (?&r), (?&r), (?&l4)\n
^\h+ge (?&r), (?&r), (?&r)\n
^\h+frc (?&r), \|(?&r)\|\n
^\h+movc (?&r), (?&r), (?&r), (?&r)\n
^\h+mul (?&r), (?&r), (?&l4)\n
^\h+ftou (?&r), (?&r)\n
^\h+dp\d (?&r), (?&cb), (?&icb)\n
^\h+dp\d (?&r), (?&cb), (?&icb)\n
^\h+dp\d (?&r), (?&cb), (?&icb)\n
^\h+dp\d (?&r), (?&cb), (?&icb)\n
^\h+dp\d (?&r), (?&r), (?&icb)\n
^\h+mad (?&r), ((?&cb)|(?&r)), (?&l1), (?&r)\n
^\h+add (?&r), (?&r), (?&l1)\n
^\h+lt (?&r), (?&r), (?&l1)\n)
(?P<Modesty>\h*discard_[nz]{1,2} (?&r)\n)

[ShaderRegexcensor.Pattern.Replace]
\n
ld_indexable(texture1d)(float,float,float,float) ${param}.xyzw, l(69,0), t120.xyzw\n
add_sat ${cond}.x, ${param}.z, l(-1.1)\n
movc ${cond}.y, ${cond}.x, l(0.10000), l(0.95)\n
${ModestyA}${cond}.y\n${ModestyB}
if_nz ${param}.z\n
	${Modesty}
endif\n
