dcl_output\ho1\.xyzw\n
dcl_output\ho2\.xy\n
dcl_output\ho3\.xyzw\n
dcl_temps\h\d+\n
(?(DEFINE)
(?# end my suffering)
    (?'r'-?r\d\d?\.[xyzw]{1,4})
    (?'v'-?v\d\d?\.[xyzw]{1,4})
    (?'cb'-?cb\d\[\d+\]\.\w{1,4})
    (?'icb'icb\[-?r\d\d?\.[xyzw]{1,4}\h\+\h-?\d+\]\.[xyzw]{1,4})
    (?'f4_0'l\((0\.000000,?\h?){4}\))
    (?'f4_0_or_1_055'l\((1\.055000,?\h?|0\.000000,?\h?){4}\))
    (?'f4_0_or_0_466'l\((0\.416666657,?\h?|0\.000000,?\h?){4}\))
    (?'f4_0_or_n0_055'l\((-0\.055000,?\h?|0\.000000,?\h?){4}\))
)
mul\h(?&r),\hv0\.yyyy,\h(?&cb)\n
mad\h(?&r),\h(?&cb),\hv0\.xxxx,\h(?&r)\n
mad\h(?&r),\h(?&cb),\hv0\.zzzz,\h(?&r)\n
add\h(?&r),\h(?&r),\h(?&cb)\n
mul\h(?&r),\h(?&r),\h(?&cb)\n
mad\h(?&r),\h(?&cb),\h(?&r),\h(?&r)\n
mad\h(?&r),\h(?&cb),\h(?&r),\h(?&r)\n
mad\ho0\.xyzw,\h(?&cb),\h(?&r),\h(?&r)\n
mul\h(?&r),\hv1\.xyzw,\h(?&cb)\n
max\h(?&r),\h(?&r),\h(?&f4_0)\n
mov\ho1\.w,\h(?&r)\n
log\h(?&r),\h(?&r)\n
mul\h(?&r),\h(?&r),\h(?&f4_0_or_0_466)\n
exp\h(?&r),\h(?&r)\n
mad\h(?&r),\h(?&r),\h(?&f4_0_or_1_055),\h(?&f4_0_or_n0_055)\n
max\ho1\.xyz,\h(?&r),\h(?&f4_0)\n
mov\ho2\.xy,\hv2\.xyxx\n
mov\ho3\.xyzw,\hv0\.xyzw\n
