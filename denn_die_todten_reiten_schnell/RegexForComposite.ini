mul\h(?&r),\h(?&r),\h(?&f4_0_or_0_466)\n
exp\h(?&r),\h(?&r)\n
mad\h(?&r),\h(?&r),\h(?&f4_0_or_1_055),\h(?&f4_0_or_n0_055)\n
max\ho1\.xyz,\h(?&r),\h(?&f4_0)\n
