namespace = TexFx

[TextureOverrideAllIBTemp]
match_bind_flags = index_buffer
match_priority = -9999
;y69 = -1
ps-t69 = null
ps-t70 = null
run = CommandListClearInstanceValues
[Constants]
global $drawn = 0
[Present]
post $drawn = 0
run = CommandListTexFxApplyTransparency
[ShaderRegexDiffuseUIStable]
shader_model = vs_5_0
run = CommandListTexFxApplyTransparency
[CommandListTexFxApplyTransparency]
if $texfx_on && !$drawn
    $drawn = 1
    Resource_MERGEo0 = ref o0
    Resource_MERGEoD = ref oD
    run = BuiltInCommandListUnbindAllRenderTargets
    o0 = set_viewport bb
    ps-t2 = ResourceLatestoD
    x70 = 1
    ps-t0 = ResourceFakeo1.B
    ps-t1 = copy ResourceFakeo6.B
    ps-t3 = ResourceFakeoD.B
    run = CustomShaderShowShaderOutput
    x70 = 2
    ps-t0 = ResourceFakeo1.F
    ps-t1 = copy ResourceFakeo6.F
    ps-t3 = ResourceFakeoD.F
    run = CustomShaderShowShaderOutput
    y103 = 6
    o0 = ref Resource_MERGEo0
    oD = ref Resource_MERGEoD
endif

[ShaderRegexDiffuseUIStable.Pattern]
dcl_globalFlags\hrefactoringAllowed\n
dcl_constantbuffer\hCB0\[\d+\],\himmediateIndexed\n
